<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Batting Filter</title>
        <link rel="stylesheet" th:href="@{/css/batting_filter.css}">
    </head>
<body>

    <div class="batting-filter-page">

        <h2>Batting Filter（試作）</h2>
        <a href="/hogehoge_01" class="back-button">← 前の画面に戻る</a>
        <hr>

        <!-- 🔽 フィルタUI -->
        <div class="filter-panel">

            <h3>フィルタ</h3>
            <form action="/batting/filter" method="get">

            <div class="filter-row">

                <!-- 投手タイプ -->
                <div class="filter-group">
                    <label>投手タイプ：</label>
                        <select name="hand">
                            <option value="ALL" th:selected="${param.hand == null or param.hand[0] == 'ALL'}">ALL</option>
                            <option value="R" th:selected="${param.hand != null and param.hand[0] == 'R'}">右</option>
                            <option value="L" th:selected="${param.hand != null and param.hand[0] == 'L'}">左</option>
                        </select>
                </div>


                <!-- 打席結果 -->
                <div class="filter-group">
                    <label>打席結果：</label>
                    <select name="result">
                        <option value="" th:selected="${param.result == null or param.result[0] == ''}">ALL</option>
                        <option value="HIT" th:selected="${param.result != null and param.result[0] == 'HIT'}">HIT</option>
                        <option value="OUT" th:selected="${param.result != null and param.result[0] == 'OUT'}">OUT</option>
                        <option value="BB"  th:selected="${param.result != null and param.result[0] == 'BB'}">BB</option>
                        <option value="HR"  th:selected="${param.result != null and param.result[0] == 'HR'}">HR</option>
                        <option value="SO"  th:selected="${param.result != null and param.result[0] == 'SO'}">SO</option>
                        <option value="Err" th:selected="${param.result != null and param.result[0] == 'Err'}">Err</option>
                        <option value="SF"  th:selected="${param.result != null and param.result[0] == 'SF'}">SF</option>
                        <option value="FC"  th:selected="${param.result != null and param.result[0] == 'FC'}">FC</option>
                    </select>
                </div>


                <!-- チーム： -->
                <div class="filter-group">
                    <label>チーム：</label>
                        <select name="opponent">

                            <!-- ALL -->
                            <option value="" th:selected="${param.opponent == null or param.opponent[0] == ''}">
                                ALL
                            </option>

                            <!-- ★ DBからループ -->
                            <option th:each="op : ${opponents}"
                                    th:value="${op}"
                                    th:text="${op}"
                                    th:selected="${param.opponent != null and param.opponent[0] == op}">
                            </option>

                        </select>
                </div>
            </div>


            <!-- /**
            * ============================================
            * ★ 投手サジェスト検索（Service）
            * ============================================
            */-->
                <div class="filter-group pitcher-group">
                    <label class="label00">投手名：</label>

                    <input type="text"
                        name="pitcher"
                        id="pitcherInput"
                        th:value="${param.pitcher}"
                        placeholder="投手名">

                    <!-- ✖クリアボタン -->
                    <span class="clear-btn" onclick="clearPitcher()">✖</span>

                    <!-- ★サジェスト（ここに移動が重要） -->
                    <ul id="pitcherSuggestions"></ul>

                    <!-- ============================================
                        ★ 投手左右 warning
                    ============================================ -->
                    <div th:if="${pitcherWarning}"
                        class="pitcher-warning">

                        ⚠ <span th:text="${pitcherWarning}"></span>

                    </div>
                </div>


        <div class="filter-group">

            <label>球種：</label>
                <select name="pitchType">
                    <option value=""
                        th:selected="${param.pitchType == null or param.pitchType[0] == ''}">
                        ALL
                    </option>

                    <option value="Four-Seam"
                        th:selected="${param.pitchType != null and param.pitchType[0] == 'Four-Seam'}">
                        Four-Seam
                    </option>

                    <option value="Sinker"
                        th:selected="${param.pitchType != null and param.pitchType[0] == 'Sinker'}">
                        Sinker
                    </option>

                    <option value="Cutter"
                        th:selected="${param.pitchType != null and param.pitchType[0] == 'Cutter'}">
                        Cutter
                    </option>

                    <option value="Slider"
                        th:selected="${param.pitchType != null and param.pitchType[0] == 'Slider'}">
                        Slider
                    </option>

                    <option value="Sweeper"
                        th:selected="${param.pitchType != null and param.pitchType[0] == 'Sweeper'}">
                        Sweeper
                    </option>

                    <option value="Splitter"
                        th:selected="${param.pitchType != null and param.pitchType[0] == 'Splitter'}">
                        Splitter
                    </option>

                    <option value="Curve"
                        th:selected="${param.pitchType != null and param.pitchType[0] == 'Curve'}">
                        Curve
                    </option>

                    <option value="Curveball"
                        th:selected="${param.pitchType != null and param.pitchType[0] == 'Curveball'}">
                        Curveball
                    </option>

                    <option value="Slurve"
                        th:selected="${param.pitchType != null and param.pitchType[0] == 'Slurve'}">
                        Slurve
                    </option>

                    <option value="Changeup"
                        th:selected="${param.pitchType != null and param.pitchType[0] == 'Changeup'}">
                        Changeup
                    </option>
                </select>
        </div>


        <!-- ============================================
                ★ 球速レンジフィルタ（ドラムロール版）
            ============================================ -->

        <div class="filter-row speed-filter-row">

            <div class="filter-group speed-filter-group">

                <label>球速レンジ</label>

                    <!-- ============================================
                        ★ 球速レンジ AVG説明
                    ============================================ -->
                    <div class="speed-range-info">

                        ※ 球速レンジによるAVG変動は、
                        「投手タイプ＋球速レンジのみ」の組み合わせ時に適用されます。

                    </div>

                <div class="speed-range-wrap">

                    <!-- MIN -->
                    <select name="speedMin" class="speed-select">

                        <option value="">MIN</option>

                        <option th:each="i : ${#numbers.sequence(50, 110)}"
                                th:value="${i}"
                                th:text="${i}"
                                th:selected="${param.speedMin != null and param.speedMin[0] == #strings.toString(i)}">
                        </option>

                    </select>

                    <span class="range-separator">〜</span>

                    <!-- MAX -->
                    <select name="speedMax" class="speed-select">

                        <option value="">MAX</option>

                        <option th:each="i : ${#numbers.sequence(50, 110)}"
                                th:value="${i}"
                                th:text="${i}"
                                th:selected="${param.speedMax != null and param.speedMax[0] == #strings.toString(i)}">
                        </option>

                    </select>

                    <span class="mph-label">mph</span>

                </div>

            </div>
        </div>

                <button type="submit">検索</button>

                <!-- クリア -->
                <button type="button" onclick="location.href='/batting/filter'">
                    クリア
                </button>

            </form>
        </div>
        <hr>

        <!-- =========================
            🔥 対ALL（メイン表示）
        ========================= -->
        <div th:if="${vsAllAvg != null}">
            <h3>対ALLピッチャー打率</h3>
            <p>
                VS ALL: <span th:text="${vsAllAvg}"></span>
                (<span th:text="${vsAllDetail}"></span>)
            </p>
        </div>

        <div th:if="${vsAllLogs != null}">
            <h3>打席ログ（対ALL）</h3>

            <div th:each="log : ${vsAllLogs}">
                <p>
                    <span th:text="${log.game_date}"></span>
                    <span th:text="${log.opponent}"></span>
                    <span th:text="${log.pitcher}"></span>
                    （<span th:text="${log.hand}"></span>）
                    →
                    <span th:text="${log.result}"></span>：
                    <span th:text="${log.description}"></span>
                </p>
            </div>
        </div>

        <!-- =========================
            右（単体表示時のみ）
        ========================= -->
        <div th:if="${vsRAvg != null}">
            <h3>対右ピッチャー打率</h3>
            <p>
                VS R: <span th:text="${vsRAvg}"></span>
                (<span th:text="${vsRDetail}"></span>)
            </p>
        </div>

        <div th:if="${vsRLogs != null}">
            <h3>打席ログ（対右）</h3>

            <div th:each="log : ${vsRLogs}">
                <p>
                    <span th:text="${log.game_date}"></span>
                    <span th:text="${log.opponent}"></span>
                    <span th:text="${log.pitcher}"></span>
                    （<span th:text="${log.hand}"></span>）
                    →
                    <span th:text="${log.result}"></span>：
                    <span th:text="${log.description}"></span>
                </p>
            </div>
        </div>

        <!-- =========================
            左（単体表示時のみ）
        ========================= -->
        <div th:if="${vsLAvg != null}">
            <h3>対左ピッチャー打率</h3>
            <p>
                VS L: <span th:text="${vsLAvg}"></span>
                (<span th:text="${vsLDetail}"></span>)
            </p>
        </div>

        <div th:if="${vsLLogs != null}">
            <h3>打席ログ（対左）</h3>

            <div th:each="log : ${vsLLogs}">
                <p>
                    <span th:text="${log.game_date}"></span>
                    <span th:text="${log.opponent}"></span>
                    <span th:text="${log.pitcher}"></span>
                    （<span th:text="${log.hand}"></span>）
                    →
                    <span th:text="${log.result}"></span>：
                    <span th:text="${log.description}"></span>
                </p>
            </div>
        </div>
    </div>


<!-- /**
* ============================================
* ★ 投手サジェスト検索（Service）
* ============================================
*/-->
<script>
        const input = document.getElementById("pitcherInput");
        const list = document.getElementById("pitcherSuggestions");

        input.addEventListener("input", async () => {

            const keyword = input.value;

            if (keyword.length < 1) {
                list.innerHTML = "";
                return;
            }

            const res = await fetch(`/api/pitchers?keyword=${keyword}`);
            const data = await res.json();

            list.innerHTML = "";

            data.forEach(name => {
                const li = document.createElement("li");
                li.textContent = name;

                // 👉 クリックで入力反映
                li.addEventListener("click", () => {
                    input.value = name;
                    list.innerHTML = "";
                });

                list.appendChild(li);
            });
        });
</script>

<!-- ============================================
    ★ 投手左右 warning
============================================ -->
<script>
        function clearPitcher() {
            const input = document.getElementById("pitcherInput");
            input.value = "";
            input.focus();

            const list = document.getElementById("pitcherSuggestions");
            if (list) list.innerHTML = "";}
</script>

</body>
</html>
